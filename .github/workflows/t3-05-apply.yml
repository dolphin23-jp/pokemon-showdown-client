name: Apply Phase 3 T3-05 battle chrome

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/phase3-t3-05-battle-chrome'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Recover and run verified application script
        shell: bash
        run: |
          git show 90a1b7edfca4452748c395572942f1a5094259a3:.github/workflows/t3-05-apply.yml > /tmp/t3-05-original.yml
          python3 - <<'PY'
          from pathlib import Path

          source = Path('/tmp/t3-05-original.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker)
          end = source.index("          PY\n", start) + len("          PY\n")
          block = source[start:end]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]

          battle_indexes = [i for i, line in enumerate(lines) if "('<strong>Battle</strong>'" in line]
          if len(battle_indexes) != 1:
              raise SystemExit(f'unexpected Battle replacement lines: {battle_indexes}')
          i = battle_indexes[0]
          lines[i] = lines[i].replace(', 3),', ', 2),')

          team_indexes = [i for i, line in enumerate(lines) if "Team so far</h3>" in line]
          if len(team_indexes) != 2:
              raise SystemExit(f'unexpected Team so far replacement lines: {team_indexes}')
          first, second = team_indexes
          lines[first] = lines[first].replace(', 1),', ', 2),')
          del lines[second]

          Path('/tmp/t3-05-apply.sh').write_text('\n'.join(lines) + '\n')
          PY
          set +e
          bash /tmp/t3-05-apply.sh > /tmp/t3-05-apply.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cp /tmp/t3-05-apply.log t3-05-apply-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add t3-05-apply-error.log
            git commit -m "Record T3-05 application failure"
            git push origin HEAD:${{ github.head_ref }}
            cat /tmp/t3-05-apply.log
            exit "$status"
          fi
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: npm test
      - name: Commit verified implementation
        shell: bash
        run: |
          rm .github/workflows/t3-05-apply.yml
          rm -f t3-05-apply-error.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add play.pokemonshowdown.com/src/client-ui-ja-strings.ts play.pokemonshowdown.com/src/panel-battle.tsx test/client-ui-ja-strings.js .github/workflows/t3-05-apply.yml t3-05-apply-error.log
          git commit -m "Apply Japanese battle chrome"
          git push origin HEAD:${{ github.head_ref }}
