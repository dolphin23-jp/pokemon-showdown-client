name: Apply Phase 3 T3-05 battle chrome

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/phase3-t3-05-battle-chrome'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Recover and run verified application script
        shell: bash
        run: |
          git show 90a1b7edfca4452748c395572942f1a5094259a3:.github/workflows/t3-05-apply.yml > /tmp/t3-05-original.yml
          python3 - <<'PY'
          from pathlib import Path

          source = Path('/tmp/t3-05-original.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker)
          end = source.index("          PY\n", start) + len("          PY\n")
          block = source[start:end]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines()) + '\n'
          battle_old = "('<strong>Battle</strong>', '<strong>{BattleChromeJA.battleTab}</strong>', 3),"
          battle_new = "('<strong>Battle</strong>', '<strong>{BattleChromeJA.battleTab}</strong>', 2),"
          if script.count(battle_old) != 1:
              raise SystemExit('unexpected Battle replacement script')
          script = script.replace(battle_old, battle_new)
          duplicate = "    ('<h3 class=\"switchselect\">Team so far</h3>', '<h3 class=\"switchselect\">{BattleChromeJA.teamSoFar}</h3>', 1),\n"
          if script.count(duplicate) != 2:
              raise SystemExit('unexpected Team so far replacement script')
          script = script.replace(duplicate + duplicate, duplicate.replace(', 1),', ', 2),'))
          Path('/tmp/t3-05-apply.sh').write_text(script)
          PY
          set +e
          bash /tmp/t3-05-apply.sh > /tmp/t3-05-apply.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            error_file="t3-05-apply-error-${GITHUB_RUN_ID}.log"
            cp /tmp/t3-05-apply.log "$error_file"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$error_file"
            git commit -m "Record T3-05 application failure ${GITHUB_RUN_ID}"
            git push origin HEAD:${{ github.head_ref }}
            cat /tmp/t3-05-apply.log
            exit "$status"
          fi
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: npm test
      - name: Commit verified implementation
        shell: bash
        run: |
          rm .github/workflows/t3-05-apply.yml
          rm -f t3-05-apply-error*.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add play.pokemonshowdown.com/src/client-ui-ja-strings.ts play.pokemonshowdown.com/src/panel-battle.tsx test/client-ui-ja-strings.js .github/workflows/t3-05-apply.yml t3-05-apply-error*.log
          git commit -m "Apply Japanese battle chrome"
          git push origin HEAD:${{ github.head_ref }}
