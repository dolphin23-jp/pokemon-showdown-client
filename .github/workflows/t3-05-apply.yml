name: Apply Phase 3 T3-05 battle chrome

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/phase3-t3-05-battle-chrome'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Recover and run verified application script
        shell: bash
        run: |
          git show HEAD^:.github/workflows/t3-05-apply.yml > /tmp/t3-05-original.yml
          python3 - <<'PY'
          from pathlib import Path

          source = Path('/tmp/t3-05-original.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker)
          end = source.index("          PY\n", start) + len("          PY\n")
          block = source[start:end]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines()) + '\n'
          Path('/tmp/t3-05-apply.sh').write_text(script)
          PY
          bash /tmp/t3-05-apply.sh
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: npm test
      - name: Commit verified implementation
        shell: bash
        run: |
          rm .github/workflows/t3-05-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add play.pokemonshowdown.com/src/client-ui-ja-strings.ts play.pokemonshowdown.com/src/panel-battle.tsx test/client-ui-ja-strings.js .github/workflows/t3-05-apply.yml
          git commit -m "Apply Japanese battle chrome"
          git push origin HEAD:${{ github.head_ref }}
