name: Apply Phase 3 T3-05 battle chrome

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/phase3-t3-05-battle-chrome'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply and format battle chrome
        shell: bash
        run: |
          git show 90a1b7edfca4452748c395572942f1a5094259a3:.github/workflows/t3-05-apply.yml > /tmp/original.yml
          git show 365212e2163a759b2b329b50ba050fe4c3036f57:.github/workflows/t3-05-apply.yml > /tmp/formatted.yml
          python3 - <<'PY'
          from pathlib import Path

          def extract_python(source, anchor=''):
              start_from = source.index(anchor) if anchor else 0
              marker = "          python3 - <<'PY'\n"
              start = source.index(marker, start_from)
              end = source.index("          PY\n", start) + len("          PY\n")
              block = source[start:end]
              return [line[10:] if line.startswith('          ') else line for line in block.splitlines()]

          apply_lines = extract_python(Path('/tmp/original.yml').read_text())
          battle = [i for i, line in enumerate(apply_lines) if "('<strong>Battle</strong>'" in line]
          if len(battle) != 1:
              raise SystemExit(f'unexpected Battle replacement lines: {battle}')
          apply_lines[battle[0]] = apply_lines[battle[0]].replace(', 3),', ', 2),')
          teams = [i for i, line in enumerate(apply_lines) if 'Team so far</h3>' in line]
          if len(teams) != 2:
              raise SystemExit(f'unexpected Team so far replacement lines: {teams}')
          apply_lines[teams[0]] = apply_lines[teams[0]].replace(', 1),', ', 2),')
          del apply_lines[teams[1]]
          Path('/tmp/apply.sh').write_text('\n'.join(apply_lines) + '\n')

          format_lines = extract_python(
              Path('/tmp/formatted.yml').read_text(),
              '      - name: Format applied source\n'
          )
          Path('/tmp/format.py').write_text('\n'.join(format_lines[1:-1]) + '\n')
          PY
          bash /tmp/apply.sh
          python3 /tmp/format.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('play.pokemonshowdown.com/src/panel-battle.tsx')
          source = path.read_text()
          old = '<button class="button" data-cmd="/ffto end"><i class="fa fa-fast-forward" aria-hidden></i><br />{BattleChromeJA.skip}</button>'
          new = '<button class="button" data-cmd="/ffto end">\n\t\t\t\t\t<i class="fa fa-fast-forward" aria-hidden></i><br />\n\t\t\t\t\t{BattleChromeJA.skip}\n\t\t\t\t</button>'
          if source.count(old) != 1:
              raise SystemExit(f'overlay skip replacement count: {source.count(old)}')
          path.write_text(source.replace(old, new))
          PY
      - name: Install dependencies
        run: npm ci
      - name: Apply lint-safe indentation
        run: npx eslint --fix play.pokemonshowdown.com/src/panel-battle.tsx
      - name: Build and test
        run: npm test
      - name: Commit verified implementation
        shell: bash
        run: |
          rm .github/workflows/t3-05-apply.yml
          rm -f t3-05-apply-error.log t3-05-test-error.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add play.pokemonshowdown.com/src/client-ui-ja-strings.ts play.pokemonshowdown.com/src/panel-battle.tsx test/client-ui-ja-strings.js .github/workflows/t3-05-apply.yml t3-05-apply-error.log t3-05-test-error.log
          git commit -m "Apply Japanese battle chrome"
          git push origin HEAD:${{ github.head_ref }}
