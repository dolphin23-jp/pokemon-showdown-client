name: Phase 3 T3-01 validation

on:
  pull_request:
    paths:
      - play.pokemonshowdown.com/src/battle-text-ja.js
      - build-tools/analyze-phase3-t3-01.mjs
      - build-tools/integrate-phase3-t3-01.mjs
      - build-tools/phase3-t3-01-battle-text.fragment.js
      - .github/workflows/phase3-t3-01-analysis.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out client branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          path: client

      - name: Check out pre-T3-01 client baseline
        uses: actions/checkout@v4
        with:
          repository: dolphin23-jp/pokemon-showdown-client
          ref: d2939675265dabb8e42c5b8ade059115ee3086db
          fetch-depth: 1
          path: baseline-client

      - name: Check out T3-00 server baseline
        uses: actions/checkout@v4
        with:
          repository: dolphin23-jp/pokemon-showdown
          ref: 8348ded9a21a545e688714f6dac8d75fee615347
          fetch-depth: 1
          path: server

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix client
          npm ci --prefix server

      - name: Extract T3-01 target templates
        run: |
          node client/build-tools/analyze-phase3-t3-01.mjs \
            server \
            "$RUNNER_TEMP/phase-3-t3-01-targets.json"

      - name: Integrate translations into the canonical object
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        working-directory: client
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          node build-tools/integrate-phase3-t3-01.mjs
          git add play.pokemonshowdown.com/src/battle-text-ja.js
          if git diff --cached --quiet; then
            echo "T3-01 translations already integrated directly."
          else
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git commit -m "Integrate Phase 3 battle text coverage"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi

      - name: Verify translated keys, placeholders, and existing entries
        working-directory: client
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import ts from 'typescript';

          const targetData = JSON.parse(fs.readFileSync(
            process.env.RUNNER_TEMP + '/phase-3-t3-01-targets.json', 'utf8'
          ));

          function readBattleText(filePath) {
            const sourceText = fs.readFileSync(filePath, 'utf8');
            if (sourceText.includes('PHASE3_T3_01_BATTLE_TEXT')) {
              throw new Error(`Temporary T3-01 runtime merge remains in ${filePath}`);
            }
            const sourceFile = ts.createSourceFile(
              filePath, sourceText, ts.ScriptTarget.Latest, true, ts.ScriptKind.JS
            );
            let object = null;
            function visit(node) {
              if (object) return;
              if (ts.isVariableDeclaration(node) && ts.isIdentifier(node.name) &&
                node.name.text === 'JAPANESE_BATTLE_TEXT') {
                if (!node.initializer || !ts.isObjectLiteralExpression(node.initializer)) {
                  throw new Error('JAPANESE_BATTLE_TEXT is not an object literal');
                }
                object = node.initializer;
                return;
              }
              ts.forEachChild(node, visit);
            }
            visit(sourceFile);
            if (!object) throw new Error(`Missing JAPANESE_BATTLE_TEXT in ${filePath}`);

            function keyName(name) {
              if (ts.isIdentifier(name) || ts.isStringLiteral(name) ||
                ts.isNoSubstitutionTemplateLiteral(name)) return name.text;
              throw new Error(`Unsupported key ${name.getText(sourceFile)}`);
            }
            function readObject(node) {
              const result = new Map();
              for (const property of node.properties) {
                if (!ts.isPropertyAssignment(property)) continue;
                const key = keyName(property.name);
                if (ts.isObjectLiteralExpression(property.initializer)) {
                  result.set(key, readObject(property.initializer));
                } else if (ts.isStringLiteral(property.initializer) ||
                  ts.isNoSubstitutionTemplateLiteral(property.initializer)) {
                  result.set(key, property.initializer.text);
                }
              }
              return result;
            }
            return readObject(object);
          }

          const current = readBattleText('play.pokemonshowdown.com/src/battle-text-ja.js');
          const baseline = readBattleText('../baseline-client/play.pokemonshowdown.com/src/battle-text-ja.js');

          for (const [namespace, baselineFields] of baseline) {
            const currentFields = current.get(namespace);
            if (!(baselineFields instanceof Map) || !(currentFields instanceof Map)) {
              throw new Error(`Existing namespace changed shape: ${namespace}`);
            }
            for (const [key, baselineValue] of baselineFields) {
              if (currentFields.get(key) !== baselineValue) {
                throw new Error(`Existing Japanese entry changed: ${namespace}.${key}`);
              }
            }
          }

          const placeholder = /\[[A-Z][A-Z0-9]*\]/g;
          for (const target of targetData.targets) {
            const value = current.get(target.namespace)?.get(target.key);
            if (typeof value !== 'string') {
              throw new Error(`Missing T3-01 translation: ${target.namespace}.${target.key}`);
            }
            const actualPlaceholders = value.match(placeholder) || [];
            if (JSON.stringify(actualPlaceholders) !== JSON.stringify(target.placeholders)) {
              throw new Error(
                `${target.namespace}.${target.key} placeholders differ: expected ` +
                `${JSON.stringify(target.placeholders)}, got ${JSON.stringify(actualPlaceholders)}`
              );
            }
          }
          console.log(
            `Verified ${targetData.totalTargets} direct additions, exact placeholders, and unchanged existing entries.`
          );
          NODE

      - name: Regenerate T3-00 inventory against client head
        run: |
          CLIENT_SHA="$(git -C client rev-parse HEAD)"
          node -e '
            const fs = require("fs");
            const path = "server/config/pokemon-showdown-client.json";
            const pin = JSON.parse(fs.readFileSync(path, "utf8"));
            pin.commit = process.argv[1];
            fs.writeFileSync(path, JSON.stringify(pin, null, 2) + "\n");
          ' "$CLIENT_SHA"
          node server/scripts/generate-phase3-battle-text-inventory.mjs \
            --server-root server \
            --client-root client \
            --output "$RUNNER_TEMP/phase-3-battle-text-inventory.json"

      - name: Require zero T3-01 gaps
        run: |
          node <<'NODE'
          const fs = require('fs');
          const targets = JSON.parse(fs.readFileSync(
            process.env.RUNNER_TEMP + '/phase-3-t3-01-targets.json', 'utf8'
          ));
          const inventory = JSON.parse(fs.readFileSync(
            process.env.RUNNER_TEMP + '/phase-3-battle-text-inventory.json', 'utf8'
          ));
          const remaining = targets.targets.filter(target =>
            inventory.byNamespace[target.namespace]?.includes(target.key)
          );
          if (remaining.length) {
            throw new Error(`Remaining T3-01 gaps: ${remaining.map(x => `${x.namespace}.${x.key}`).join(', ')}`);
          }
          console.log(
            `Verified zero remaining T3-01 gaps; total inventory is now ${inventory.totalMissing}.`
          );
          NODE

      - name: Upload T3-01 validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-3-t3-01-validation
          path: |
            ${{ runner.temp }}/phase-3-t3-01-targets.json
            ${{ runner.temp }}/phase-3-battle-text-inventory.json
          if-no-files-found: warn
