name: Phase 3 T3-01 target analysis

on:
  pull_request:
    paths:
      - build-tools/analyze-phase3-t3-01.mjs
      - build-tools/phase3-t3-01-battle-text.fragment.js
      - .github/workflows/phase3-t3-01-analysis.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Check out client branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          path: client

      - name: Check out T3-00 server baseline
        uses: actions/checkout@v4
        with:
          repository: dolphin23-jp/pokemon-showdown
          ref: 8348ded9a21a545e688714f6dac8d75fee615347
          path: server

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Extract T3-01 target templates
        run: |
          node client/build-tools/analyze-phase3-t3-01.mjs \
            server \
            "$RUNNER_TEMP/phase-3-t3-01-targets.json"

      - name: Apply translated T3-01 block
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        working-directory: client
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const targetPath = 'play.pokemonshowdown.com/src/battle-text-ja.js';
          const fragmentPath = 'build-tools/phase3-t3-01-battle-text.fragment.js';
          const marker = '\n\tconst DIRECT_NAME_FIELDS = {';
          const sentinel = '\tconst PHASE3_T3_01_BATTLE_TEXT = {';
          const source = fs.readFileSync(targetPath, 'utf8');
          if (!source.includes(sentinel)) {
            if (!source.includes(marker)) throw new Error('Battle text insertion marker not found');
            const fragment = fs.readFileSync(fragmentPath, 'utf8').trimEnd();
            fs.writeFileSync(targetPath, source.replace(marker, `\n${fragment}\n${marker}`));
          }
          NODE
          git add play.pokemonshowdown.com/src/battle-text-ja.js
          if git diff --cached --quiet; then
            echo "T3-01 block already applied."
          else
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git commit -m "Add Phase 3 ability and item battle text"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi

      - name: Upload T3-01 target analysis
        uses: actions/upload-artifact@v4
        with:
          name: phase-3-t3-01-targets
          path: ${{ runner.temp }}/phase-3-t3-01-targets.json
