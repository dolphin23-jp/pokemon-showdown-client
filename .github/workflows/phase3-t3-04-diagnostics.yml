name: Phase 3 T3-04 diagnostics

on:
  pull_request:
    paths:
      - play.pokemonshowdown.com/src/client-ui-ja-strings.ts
      - test/client-ui-ja-strings.js
      - .github/workflows/phase3-t3-04-diagnostics.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Apply T3-04 lint-only corrections
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('play.pokemonshowdown.com/src/client-ui-ja-strings.ts')
          text = path.read_text()
          replacements = {
              "if (Object.prototype.hasOwnProperty.call(strings, english)) {": "if (strings[english] !== undefined) {",
              "saveValueEvs: ['save \\${…} EVs', '努力値を\\${…}節約できます'],": "// eslint-disable-next-line no-template-curly-in-string\n\tsaveValueEvs: ['save ${…} EVs', '努力値を${…}節約できます'],",
              "matchingValue: ['matching \"\\${…}\"', '「\\${…}」に一致する'],": "// eslint-disable-next-line no-template-curly-in-string\n\tmatchingValue: ['matching \"${…}\"', '「${…}」に一致する'],",
          }
          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new)
              elif new not in text:
                  raise SystemExit(f'T3-04 correction marker not found: {old}')
          path.write_text(text)
          PY
          git add play.pokemonshowdown.com/src/client-ui-ja-strings.ts
          if ! git diff --cached --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git commit -m "Preserve inventory placeholder literals"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture client test output
        run: |
          set +e
          npm test > "$RUNNER_TEMP/t3-04-client-test.log" 2>&1
          status=$?
          echo "$status" > "$RUNNER_TEMP/t3-04-client-test.status"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: phase-3-t3-04-diagnostics
          path: |
            ${{ runner.temp }}/t3-04-client-test.log
            ${{ runner.temp }}/t3-04-client-test.status
