name: Phase 3 T3-04 diagnostics

on:
  pull_request:
    paths:
      - play.pokemonshowdown.com/src/client-ui-ja-strings.ts
      - test/client-ui-ja-strings.js
      - .github/workflows/phase3-t3-04-diagnostics.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Apply T3-04 test correction
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('test/client-ui-ja-strings.js')
          text = path.read_text()
          old = """\t\t\tassert.ok(
\t\t\t\tdeclaration.initializer && ts.isObjectLiteralExpression(declaration.initializer),
\t\t\t\t`${declaration.name.text} must be an object literal`
\t\t\t);
\t\t\tconst entries = [];
\t\t\tfor (const property of declaration.initializer.properties) {"""
          new = """\t\t\tlet initializer = declaration.initializer;
\t\t\tif (initializer && ts.isAsExpression(initializer)) initializer = initializer.expression;
\t\t\tassert.ok(
\t\t\t\tinitializer && ts.isObjectLiteralExpression(initializer),
\t\t\t\t`${declaration.name.text} must be an object literal`
\t\t\t);
\t\t\tconst entries = [];
\t\t\tfor (const property of initializer.properties) {"""
          if old in text:
              path.write_text(text.replace(old, new))
          elif new not in text:
              raise SystemExit('T3-04 AST correction marker not found')
          PY
          git add test/client-ui-ja-strings.js
          if ! git diff --cached --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git commit -m "Handle const assertions in UI chrome test"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture client test output
        run: |
          set +e
          npm test > "$RUNNER_TEMP/t3-04-client-test.log" 2>&1
          status=$?
          echo "$status" > "$RUNNER_TEMP/t3-04-client-test.status"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: phase-3-t3-04-diagnostics
          path: |
            ${{ runner.temp }}/t3-04-client-test.log
            ${{ runner.temp }}/t3-04-client-test.status
