name: Phase 3 T3-02 fix fragment lint

on:
  pull_request:
    paths:
      - .github/workflows/phase3-t3-02-fix-fragment-lint.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Mark temporary fragment as generated
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          file=build-tools/phase3-t3-02-battle-text.fragment.js
          if ! head -n 1 "$file" | grep -q 'eslint-disable no-unused-vars'; then
            sed -i '1i/* eslint-disable no-unused-vars */' "$file"
            git add "$file"
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git commit -m "Mark temporary T3-02 fragment as generated"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
