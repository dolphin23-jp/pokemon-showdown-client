name: ESLint autofix

on:
  push:
    branches:
      - agent/japanese-teambuilder-display

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/japanese-teambuilder-display
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: >-
          npx eslint --fix
          play.pokemonshowdown.com/src/battle-display-names.ts
          test/display-names.js
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add play.pokemonshowdown.com/src/battle-display-names.ts test/display-names.js
          git commit -m "Apply ESLint fixes"
          git push origin HEAD:agent/japanese-teambuilder-display
