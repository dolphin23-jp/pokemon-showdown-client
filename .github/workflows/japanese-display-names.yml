name: Japanese display names

on:
  pull_request:
    paths:
      - package.json
      - build-tools/generate-japanese-display-names.js
      - play.pokemonshowdown.com/index-new.html
      - play.pokemonshowdown.com/testclient-new.html
      - play.pokemonshowdown.com/src/battle-display-names.ts
      - test/display-names.js
      - test/japanese-display-name-generator.js
      - docs/japanese-display-names.md
      - config/japanese-display-name-api.json
      - .github/workflows/japanese-display-names.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build client and generated Japanese maps
        run: npm run build
      - name: Type-check client
        run: npx tsc
      - name: Lint display-name changes
        id: lint
        continue-on-error: true
        run: >-
          npx eslint --max-warnings 0 --format json
          play.pokemonshowdown.com/src/battle-display-names.ts
          build-tools/generate-japanese-display-names.js
          test/display-names.js
          test/japanese-display-name-generator.js
          > eslint-report.json
      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json
      - name: Fail on ESLint errors
        if: steps.lint.outcome == 'failure'
        run: exit 1
      - name: Test display-name API and generator
        run: node --test test/display-names.js test/japanese-display-name-generator.js
      - name: Verify compiled API and generated data contract
        run: |
          test -s play.pokemonshowdown.com/js/battle-display-names.js
          test -s play.pokemonshowdown.com/js/battle-display-names.meta.json
          grep -q 'PSDisplayNames' play.pokemonshowdown.com/js/battle-display-names.js
          grep -q 'BattleJapaneseDisplayNames' play.pokemonshowdown.com/js/battle-display-names.js
          grep -q '227b573712414a86ba299d322fa398fbb2893edc' play.pokemonshowdown.com/js/battle-display-names.js
          grep -q 'js/battle-display-names.js' play.pokemonshowdown.com/testclient-new.html
          grep -q '/js/battle-display-names.js?' play.pokemonshowdown.com/index-new.html
