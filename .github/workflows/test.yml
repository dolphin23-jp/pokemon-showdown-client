# This workflow will do an install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  protect-t3-07-import-export:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/phase3-t3-07-teambuilder-labels'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v6
      with:
        ref: agent/phase3-t3-07-teambuilder-labels
        fetch-depth: 0
    - name: Use Node.js 22
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'
    - run: npm ci
    - name: Protect Import Export scope
      run: |
        node build-tools/fix-t3-07-import-export-scope.js
        rm build-tools/fix-t3-07-import-export-scope.js
        npx eslint --fix \
          play.pokemonshowdown.com/src/panel-teambuilder.tsx \
          test/teambuilder-ja-chrome.js
        npm test
    - name: Commit verified protection
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Keep Team Import Export UI in English"
        git push origin HEAD:agent/phase3-t3-07-teambuilder-labels

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run test
      env:
        CI: true
