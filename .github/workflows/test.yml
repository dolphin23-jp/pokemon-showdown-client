name: Apply Phase 3 T3-07

on:
  push:
    branches:
      - agent/phase3-t3-07-teambuilder-labels

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/phase3-t3-07-teambuilder-labels
          fetch-depth: 0
      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply Teambuilder chrome
        run: node build-tools/apply-t3-07-teambuilder-labels.js | tee t3-07-apply-summary.json
      - name: Validate client
        run: npm test
        env:
          CI: true
      - name: Commit verified implementation
        run: |
          git fetch origin master
          git show origin/master:.github/workflows/test.yml > .github/workflows/test.yml
          rm -f build-tools/apply-t3-07-teambuilder-labels.js t3-07-trigger.txt t3-07-apply-summary.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Localize Teambuilder labels"
          git push origin HEAD:agent/phase3-t3-07-teambuilder-labels
