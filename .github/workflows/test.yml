name: Diagnose Phase 3 T3-06

on:
  push:
    branches:
      - agent/phase3-t3-06-forfeit-dialog

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/phase3-t3-06-forfeit-dialog
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: Capture test result
        shell: bash
        run: |
          set +e
          npm run test > /tmp/t3-06-test.log 2>&1
          status=$?
          set -e
          {
            echo "status=$status"
            tail -n 160 /tmp/t3-06-test.log
          } > t3-06-test-diagnostic.txt
      - name: Commit diagnostic
        run: |
          git show 815eb85343c4ceee0dc85ff853967cf5d8bbc773:.github/workflows/test.yml > .github/workflows/test.yml
          rm -f t3-06-diagnostic-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record T3-06 client test diagnostic"
          git push origin HEAD:agent/phase3-t3-06-forfeit-dialog
