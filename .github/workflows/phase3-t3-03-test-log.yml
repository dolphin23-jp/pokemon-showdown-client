name: Phase 3 T3-03 test diagnostics

on:
  pull_request:
    paths:
      - test/battle-text-japanese.js
      - .github/workflows/phase3-t3-03-test-log.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture client test output
        run: |
          set +e
          npm test > "$RUNNER_TEMP/t3-03-client-test.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/t3-03-client-test.log"
          echo "$status" > "$RUNNER_TEMP/t3-03-client-test.status"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: phase-3-t3-03-test-diagnostics
          path: |
            ${{ runner.temp }}/t3-03-client-test.log
            ${{ runner.temp }}/t3-03-client-test.status
