name: Phase 3 T3-03 test diagnostics

on:
  pull_request:
    paths:
      - test/battle-text-japanese.js
      - .github/workflows/phase3-t3-03-test-log.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Correct Disguise activation expectation
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('test/battle-text-japanese.js')
          text = path.read_text()
          old = "expected: '[[Mimiのばけのかわ]]\\n  ばけのかわが身代わりになった！\\n',"
          new = "expected: '[Mimiのばけのかわ]\\n  ばけのかわが身代わりになった！\\n',"
          if old in text:
              path.write_text(text.replace(old, new))
          elif new not in text:
              raise SystemExit('Disguise expectation marker not found')
          PY
          git add test/battle-text-japanese.js
          if ! git diff --cached --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git commit -m "Match Disguise activation rendering"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture client test output
        run: |
          set +e
          npm test > "$RUNNER_TEMP/t3-03-client-test.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/t3-03-client-test.log"
          echo "$status" > "$RUNNER_TEMP/t3-03-client-test.status"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: phase-3-t3-03-test-diagnostics
          path: |
            ${{ runner.temp }}/t3-03-client-test.log
            ${{ runner.temp }}/t3-03-client-test.status
