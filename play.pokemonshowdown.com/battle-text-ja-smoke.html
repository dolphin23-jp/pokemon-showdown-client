<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1.0" />
	<title>Japanese battle log smoke</title>
	<style>
		:root { color-scheme: light; }
		* { box-sizing: border-box; }
		body {
			margin: 0;
			background: #d8e5ef;
			color: #222;
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}
		main {
			width: min(920px, calc(100% - 48px));
			margin: 28px auto;
			background: #fff;
			border: 1px solid #9baab6;
			border-radius: 10px;
			box-shadow: 0 4px 18px rgb(0 0 0 / 16%);
			overflow: hidden;
		}
		header {
			padding: 18px 24px;
			background: linear-gradient(#56758e, #3e5d75);
			color: #fff;
		}
		h1 { margin: 0; font-size: 24px; }
		.meta { margin-top: 5px; font-size: 13px; opacity: 0.9; }
		#battle-log {
			min-height: 700px;
			padding: 22px 28px 34px;
			font-size: 18px;
			line-height: 1.65;
			white-space: pre-wrap;
		}
		.major { margin-top: 12px; font-weight: 700; }
		.result { padding-left: 18px; }
		.error { color: #b00020; font-weight: 700; }
	</style>
	<script defer src="/js/battle-dex-data.js?"></script>
	<script defer src="/js/battle-dex.js?"></script>
	<script defer src="/js/battle-display-names.js?"></script>
	<script defer src="/js/battle-text-parser.js?"></script>
	<script defer src="/data/text.js?"></script>
	<script defer src="/src/battle-text-ja.js?"></script>
	<script defer src="/src/battle-text-ja-smoke.js?"></script>
</head>
<body>
	<main>
		<header>
			<h1>対戦ログ日本語表示・実戦確認</h1>
			<div class="meta" id="metadata">実際の1ターン対戦プロトコルを読み込み中…</div>
		</header>
		<div id="battle-log" role="log" aria-live="polite"></div>
	</main>
</body>
</html>
